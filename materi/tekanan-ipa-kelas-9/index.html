<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aplikasi Materi</title>
  <link rel="manifest" href="../../manifest.json">
  <meta name="theme-color" content="#10853F">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/vendor/katex/katex.min.css">
  <script defer src="../../assets/vendor/katex/katex.min.js"></script>
  <script defer src="../../assets/vendor/katex/contrib/auto-render.min.js"></script>
  <script src="../../assets/js/storage.js" defer></script>
  <script src="../../assets/js/app.js" defer></script>
  <script src="../../assets/js/focus-card.js" defer></script>
  <style>
    .focus-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background-color:var(--bg-surface); z-index:1000; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.2,0,0,1); display:flex; flex-direction:column; }
    .focus-overlay.active { transform:translateY(0); }
    .focus-header { padding:16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-subtle); background-color:var(--nav-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
    .focus-body { flex:1; overflow-y:auto; padding:24px; padding-bottom:100px; }
    .focus-nav { position:absolute; bottom:0; left:0; right:0; padding:16px 24px; background-color:var(--nav-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border-subtle); display:flex; justify-content:space-between; padding-bottom:calc(16px + env(safe-area-inset-bottom,0px)); }
    .back-btn { display:inline-flex; align-items:center; gap:8px; color:var(--text-secondary); text-decoration:none; margin-top:16px; font-weight:600; padding:8px 0; }
  </style>
</head>
<body>
  <div class="app-container container">
    <a href="../../index.html" class="back-btn"><span class="material-icons">arrow_back</span> Kembali</a>
    <header class="anim-fade-down mt-4">
      <div class="date-badge mb-2">IPA</div>
      <h1 class="text-h1" id="materi-title">Memuat...</h1>
      <p class="text-body mt-2" id="materi-desc">Tunggu sebentar...</p>
    </header>
    <section class="mt-4">
      <h2 class="text-h3 mb-4">Daftar Konsep</h2>
      <div id="concept-list" class="flex-col gap-3">
        <div class="skeleton" style="height:80px;width:100%;border-radius:24px;"></div>
        <div class="skeleton" style="height:80px;width:100%;border-radius:24px;"></div>
        <div class="skeleton" style="height:80px;width:100%;border-radius:24px;"></div>
      </div>
    </section>
  </div>
  <div data-component="focus-panel"></div>
  <div data-component="bottom-nav"></div>
  <script>
    document.addEventListener('app:ready', function() {
      if(window.FocusCardManager) window.FocusCardManager.init('materi.json');
    });
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        if(window.FocusCardManager && !window.FocusCardManager.data) window.FocusCardManager.init('materi.json');
      }, 600);
    });
  </script>
</body>
</html>
