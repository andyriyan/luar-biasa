<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="100%" height="100%">
  <!-- Background -->
  <rect width="100%" height="100%" fill="none" />
  
  <!-- Trapezoid -->
  <polygon points="50,30 150,30 170,90 30,90" fill="#E8F5E9" stroke="#10853F" stroke-width="3" />
  
  <!-- Labels -->
  <!-- Top base -->
  <text x="100" y="24" font-family="'Inter', sans-serif" font-size="12" fill="#10853F" font-weight="bold" text-anchor="middle">10 cm</text>
  <!-- Bottom base -->
  <text x="100" y="106" font-family="'Inter', sans-serif" font-size="12" fill="#10853F" font-weight="bold" text-anchor="middle">14 cm</text>
  <!-- Height line -->
  <line x1="50" y1="30" x2="50" y2="90" stroke="#10853F" stroke-width="2" stroke-dasharray="4 4" />
  <!-- Height square indicator -->
  <rect x="50" y="80" width="10" height="10" fill="none" stroke="#10853F" stroke-width="1.5" />
  <text x="42" y="65" font-family="'Inter', sans-serif" font-size="12" fill="#10853F" font-weight="bold" text-anchor="end">6 cm</text>
</svg>